name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── library-service (Java / Spring Boot) ──────────────────────────────────
  test-library-service:
    name: library-service unit tests (Java 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run unit tests
        working-directory: library-service
        run: mvn test --batch-mode --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: library-service-test-report
          path: library-service/target/surefire-reports/

  # ── loans-service (Go) ────────────────────────────────────────────────────
  test-loans-service:
    name: loans-service unit tests (Go 1.22)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: loans-service/go.sum

      - name: Run unit tests
        working-directory: loans-service
        run: go test ./... -v -count=1

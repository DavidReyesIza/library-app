server:
  port: ${LIBRARY_SERVICE_PORT:8080}

spring:
  application:
    name: library-service

  datasource:
    url: jdbc:postgresql://${LIBRARY_DB_HOST:localhost}:${LIBRARY_DB_PORT:5432}/${LIBRARY_DB_NAME:library_db}
    username: ${LIBRARY_DB_USER:library_user}
    password: ${LIBRARY_DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# loans-service integration
loans:
  service:
    url: ${LOANS_SERVICE_URL:http://localhost:8081}
    timeout-ms: 5000

# Internal API key (shared with loans-service)
internal:
  api-key: ${INTERNAL_API_KEY}

---
# Test profile — uses H2 and disables Flyway migrations (schema via JPA)
spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-for-testing-only-min-32-chars
  expiration-ms: 3600000

internal:
  api-key: test-internal-key
